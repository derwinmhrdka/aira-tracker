# Auto deploy to VPS — Baby Tracker (aira.teknodika.com)
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/apps/aira-tracker"; fi
            cd "$APP_DIR"
            if [ ! -f deploy/git-sync.sh ]; then
              echo "==> Bootstrap: pulling latest main (deploy scripts not on VPS yet)..."
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            fi
            chmod +x deploy/git-sync.sh deploy/docker-deploy.sh
            bash deploy/git-sync.sh
            bash deploy/docker-deploy.sh
