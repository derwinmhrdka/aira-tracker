# /etc/nginx/sites-available/aira.conf
#
# Proxy ALL requests to Docker app (127.0.0.1:13082).
# Next.js serves API routes on the same port — no separate /api upstream.
#
# Port 3082: optional redirect IP:3082 → aira.teknodika.com
# (Docker uses 127.0.0.1:13082 — do not bind 0.0.0.0:13082 publicly)

server {
    listen 3082;
    listen [::]:3082;
    server_name _;

    return 301 https://aira.teknodika.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name aira.teknodika.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aira.teknodika.com;

    ssl_certificate /etc/letsencrypt/live/aira.teknodika.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aira.teknodika.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 3M;

    location / {
        proxy_pass http://127.0.0.1:13082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
